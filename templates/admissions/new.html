{% extends "base.html" %}
{% block title %}New Admission - Rental Library{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('admissions.index') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="fas fa-arrow-left"></i>
  </a>
  <h3 class="mb-0">New Admission</h3>
</div>

<div class="card shadow-sm" style="max-width:600px;">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Full Name <span class="text-danger">*</span></label>
        <input type="text" name="full_name" class="form-control" value="{{ form.get('full_name','') }}" required maxlength="120">
        <div class="form-text">Username will be set to this name (lowercase). Password = auto-generated 4-digit Member ID.</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone <span class="text-danger">*</span></label>
        <input type="text" name="phone" class="form-control" value="{{ form.get('phone','') }}" required maxlength="30">
      </div>

      <div class="mb-3">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" name="email" class="form-control" value="{{ form.get('email','') }}" required maxlength="120">
      </div>

      <div class="mb-3">
        <label class="form-label">Address <span class="text-danger">*</span></label>
        <textarea name="address" class="form-control" rows="2" required maxlength="255">{{ form.get('address','') }}</textarea>
      </div>

      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label">Membership Start Date</label>
          <input type="date" name="membership_start_date" class="form-control" value="{{ form.get('membership_start_date', today.isoformat() if today else '') }}">
          <div class="form-text">Leave blank to use today.</div>
        </div>
        <div class="col">
          <label class="form-label">Duration</label>
          <select name="duration_months" class="form-select">
            <option value="1">1 Month</option>
            <option value="2">2 Months</option>
            <option value="3">3 Months</option>
            <option value="6">6 Months</option>
            <option value="12">12 Months</option>
          </select>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Register Member</button>
        <a href="{{ url_for('admissions.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
